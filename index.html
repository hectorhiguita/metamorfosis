<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metamorfosis</title>
    <script>
      // Restore path encoded by 404.html redirect
      (function () {
        var l = window.location
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function (s) { return s.replace(/~and~/g, '&') })
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + (decoded[0] ? '/' + decoded[0].slice(3) : '') +
            (decoded[1] ? '?' + decoded[1].slice(2) : '') +
            l.hash
          )
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
